services:
  backend:
    container_name: meme-archive-backend
    env_file:
      - .env
    environment:
      - PORT=8000
      - UPLOAD_DIR=/data/uploads
    image: ${BACKEND_IMAGE:-ghcr.io/tancred423/memearchive/backend:latest}
    networks:
      - default
      - mysql-network
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    volumes:
      - meme_archive_uploads:/data/uploads

  frontend:
    container_name: meme-archive-frontend
    depends_on:
      - backend
    image: ${FRONTEND_IMAGE:-ghcr.io/tancred423/memearchive/frontend:latest}
    ports:
      - "${APP_PORT:-80}:80"
    restart: unless-stopped

volumes:
  meme_archive_uploads:

networks:
  mysql-network:
    external: true
